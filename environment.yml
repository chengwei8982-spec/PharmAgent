name: PharmAgent
channels:
  - conda-forge
dependencies:
  - python=3.10
  - pip
  - numpy
  - pandas
  - scipy
  - scikit-learn
  - matplotlib
  - seaborn
  - tqdm
  - networkx
  - requests
  - pydantic
  - lmdb
  - rdkit
  - pip:
      # Note: PyTorch / DGL / PyG are CUDA-sensitive; install them separately.
      - transformers
      - ogb
      - tdc
      - python-Levenshtein
      - pandas-flavor
      - plip
      # Server (pin to pydantic v1 for compatibility)
      - pydantic<2
      - fastapi<0.100
      - uvicorn[standard]
